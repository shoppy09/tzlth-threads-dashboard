name: Publish Scheduled Threads Posts

on:
  schedule:
    # Once daily at UTC 01:00 (台灣 09:00). 降頻自 */30（2026-07-10）：
    # 排程發文功能自 2026-04 起閒置（scheduled-posts.json 長期為 []），Tim 實際發文走手動/Threads週規劃，
    # 每 30 分空跑只是噪音源。⚠️ 若未來重新啟用看板排程發文，須恢復較高頻率（如 */30），否則排程貼文最多延遲 24h。
    - cron: '0 1 * * *'
  workflow_dispatch:   # 手動觸發，供測試使用

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write   # 允許寫回 scheduled-posts.json

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dateutil

      - name: Publish due scheduled posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python scripts/publish_scheduled.py
