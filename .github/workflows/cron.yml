name: Fetch Threads Data
on:
  schedule:
    - cron: '0 2,14 * * *'   # UTC 02:00/14:00 = 台灣時間 10:00/22:00
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # CRITICAL：預設 read-only，push 需要 write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Fetch Threads data
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: node fetch-threads.js
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add follower-history.json threads-data.json
          git diff --staged --quiet || git commit -m "auto: sync Threads data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
