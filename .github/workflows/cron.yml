name: Fetch Threads Data
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write          # CRITICAL：預設 read-only，push 需要 write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - name: Fetch Threads data
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: node fetch-threads.js
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add follower-history.json threads-data.json
          git diff --staged --quiet || git commit -m "auto: sync Threads data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
